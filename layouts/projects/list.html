{{ define "main" }}

<h1 style="color:var(--text-color);">Projects</h1>
<br>

<div class="projects-grid" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:1rem;">
  {{ range .Pages }}
    <div class="project-card" style="border:1px solid var(--border-color); padding:1rem; border-radius:0.5rem; text-align:center; background-color:var(--card-bg);">
      {{ with .Params.thumbnail }}
        <img src="{{ . }}" alt="Thumbnail for {{ $.Title }}" style="width:100%; height:auto; object-fit:cover; border-radius:0.5rem;">
      {{ end }}
      <h3>
        <a href="{{ .RelPermalink }}" style="text-decoration:underline; color:var(--link-color);">
          {{ .Title }}
        </a>
      </h3>
      {{ with .Params.blurb }}
        <p style="color:var(--text-color);">{{ . }}</p>
      {{ end }}
    </div>
  {{ end }}
</div>

{{ end }}
